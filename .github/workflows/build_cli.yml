name: Build PolySplines CLI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Download & extract safely
      - name: Download source
        shell: pwsh
        run: |
          curl -L -o src.zip "https://bitbucket.org/surflab/polyhedral_splines/get/master.zip"

          Expand-Archive src.zip -DestinationPath extracted

          Write-Host "Extracted folders:"
          Get-ChildItem extracted

          # Find actual root folder
          $root = Get-ChildItem extracted -Directory | Select-Object -First 1

          if (-not $root) {
            Write-Error "Extraction failed"
            exit 1
          }

          Move-Item $root.FullName poly_src

          Write-Host "poly_src created:"
          Get-ChildItem poly_src

      # 2. Verify structure
      - name: Debug structure
        shell: pwsh
        run: |
          Write-Host "Listing poly_src:"
          Get-ChildItem -Recurse poly_src

      # 3. Add CLI entry
      - name: Add CLI entry
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path poly_src/src/cli | Out-Null

          Set-Content poly_src/src/cli/main.cpp '#include <iostream>'
          Add-Content poly_src/src/cli/main.cpp '#include "ProcessMesh.h"'
          Add-Content poly_src/src/cli/main.cpp '#include "IGSWriter.h"'
          Add-Content poly_src/src/cli/main.cpp ''
          Add-Content poly_src/src/cli/main.cpp 'int main(int argc, char** argv)'
          Add-Content poly_src/src/cli/main.cpp '{'
          Add-Content poly_src/src/cli/main.cpp '    if (argc < 3)'
          Add-Content poly_src/src/cli/main.cpp '    {'
          Add-Content poly_src/src/cli/main.cpp '        std::cout << "Usage: polyspline_cli input.obj output.igs\n";'
          Add-Content poly_src/src/cli/main.cpp '        return 1;'
          Add-Content poly_src/src/cli/main.cpp '    }'
          Add-Content poly_src/src/cli/main.cpp ''
          Add-Content poly_src/src/cli/main.cpp '    ProcessMesh proc;'
          Add-Content poly_src/src/cli/main.cpp '    proc.loadMesh(argv[1]);'
          Add-Content poly_src/src/cli/main.cpp '    proc.buildPNS();'
          Add-Content poly_src/src/cli/main.cpp ''
          Add-Content poly_src/src/cli/main.cpp '    auto patches = proc.getPatches();'
          Add-Content poly_src/src/cli/main.cpp ''
          Add-Content poly_src/src/cli/main.cpp '    IGSWriter writer;'
          Add-Content poly_src/src/cli/main.cpp '    writer.write(argv[2], patches);'
          Add-Content poly_src/src/cli/main.cpp ''
          Add-Content poly_src/src/cli/main.cpp '    std::cout << "Done\n";'
          Add-Content poly_src/src/cli/main.cpp '    return 0;'
          Add-Content poly_src/src/cli/main.cpp '}'

      # 4. Patch CMake (dynamic include fix)
      - name: Patch CMake
        shell: pwsh
        run: |
          $proc = Get-ChildItem poly_src -Recurse -Filter "ProcessMesh.h" | Select-Object -First 1
          $igs  = Get-ChildItem poly_src -Recurse -Filter "IGSWriter.h" | Select-Object -First 1

          if (-not $proc -or -not $igs) {
            Write-Error "Headers not found"
            exit 1
          }

          $procDir = Split-Path $proc.FullName
          $igsDir  = Split-Path $igs.FullName

          Write-Host "ProcessMesh.h in: $procDir"
          Write-Host "IGSWriter.h in: $igsDir"

          Add-Content poly_src/CMakeLists.txt "add_executable(polyspline_cli src/cli/main.cpp)"
          Add-Content poly_src/CMakeLists.txt "target_include_directories(polyspline_cli PRIVATE `"$procDir`" `"$igsDir`")"
          Add-Content poly_src/CMakeLists.txt "target_link_libraries(polyspline_cli pns_core)"

      # 5. Build
      - name: Build
        shell: pwsh
        run: |
          cd poly_src
          mkdir build
          cd build
          cmake .. -A x64
          cmake --build . --config Release

      # 6. Collect EXE
      - name: Collect EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem poly_src/build -Recurse -Filter "polyspline_cli.exe" | Select-Object -First 1

          if (-not $exe) {
            Write-Error "EXE not found"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path output | Out-Null
          Copy-Item $exe.FullName output/

      # 7. Upload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: polyspline_cli
          path: output/polyspline_cli.exe

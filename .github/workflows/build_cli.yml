name: Build PolySplines CLI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Download source
      - name: Download source
        shell: pwsh
        run: |
          curl -L -o src.zip "https://bitbucket.org/surflab/polyhedral_splines/get/master.zip"
          Expand-Archive src.zip -DestinationPath extracted
          $root = Get-ChildItem extracted -Directory | Select-Object -First 1
          Move-Item $root.FullName poly_src

      # 2. Show structure (important)
      - name: Debug structure
        shell: pwsh
        run: |
          Get-ChildItem -Recurse poly_src

      # 3. Create CLI main.cpp (minimal)
      - name: Create CLI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path poly_src/src/cli | Out-Null

          Set-Content poly_src/src/cli/main.cpp '#include <iostream>'
          Add-Content poly_src/src/cli/main.cpp ''
          Add-Content poly_src/src/cli/main.cpp 'int main()'
          Add-Content poly_src/src/cli/main.cpp '{'
          Add-Content poly_src/src/cli/main.cpp '    std::cout << "PolySplines CLI placeholder\n";'
          Add-Content poly_src/src/cli/main.cpp '    return 0;'
          Add-Content poly_src/src/cli/main.cpp '}'

      # 4. Patch CMake (BUILD EVERYTHING)
      - name: Patch CMake
        shell: pwsh
        run: |
          Add-Content poly_src/CMakeLists.txt "
file(GLOB_RECURSE ALL_SRC src/*.cpp)
add_executable(polyspline_cli \${ALL_SRC})
"

      # 5. Build
      - name: Build
        shell: pwsh
        run: |
          cd poly_src
          mkdir build
          cd build
          cmake .. -A x64
          cmake --build . --config Release

      # 6. Collect EXE
      - name: Collect EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem poly_src/build -Recurse -Filter "polyspline_cli.exe" | Select-Object -First 1

          if (-not $exe) {
            Write-Error "EXE not found"
            exit 1
          }

          mkdir output
          Copy-Item $exe.FullName output/

      # 7. Upload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: polyspline_cli
          path: output/polyspline_cli.exe
